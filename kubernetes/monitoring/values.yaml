grafana:

  persistence:
    enabled: true
    storageClassName: local-path
    size: 2Gi

  service:
    type: ClusterIP

prometheus:
  prometheusSpec:
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
  config:
    global:
      smtp_from: alertmanager@lennardjohn.org
      smtp_smarthost: smtp.gmail.com:587
      smtp_auth_username: lennardvincentjohn@gmail.com
      smtp_auth_password: INJECTED_BY_ANSIBLE
      smtp_require_tls: true
    route:
      receiver: email
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: email
          matchers:
            - severity =~ "critical|warning"
    receivers:
      - name: email
        email_configs:
          - to: lennardvincentjohn@gmail.com
            send_resolved: true

