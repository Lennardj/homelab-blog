---
- name: Install Kubernetes platform services
  hosts: k8s_control_plane
  become: true
  vars:
    kubeconfig: /home/{{ ansible_user }}/.kube/config

  tasks:

    - name: Ensure ingress-nginx namespace exists
      command: kubectl create namespace ingress-nginx
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: ingress_ns
      failed_when: false
      changed_when: "'created' in ingress_ns.stdout"

    - name: Install NGINX Ingress Controller
      command: >
        kubectl apply -f
        https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/baremetal/deploy.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Wait for ingress controller pods to exist
      command: kubectl get pods -n ingress-nginx
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: ingress_pods
      retries: 20
      delay: 20
      until: "'ingress-nginx-controller' in ingress_pods.stdout"

    - name: Wait for ingress controller to stabilise
      shell: |
        kubectl get pods -n ingress-nginx --no-headers | (grep Running || true) | wc -l
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: ingress_ready
      retries: 20
      delay: 20
      until: ingress_ready.stdout|int >= 1

    - name: Install Local Path Provisioner
      command: >
        kubectl apply -f
        https://raw.githubusercontent.com/rancher/local-path-provisioner/v0.0.35/deploy/local-path-storage.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Wait for Local Path Provisioner pods to exist
      command: kubectl get pods -n local-path-storage
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: storage_pods
      retries: 20
      delay: 20
      until: "'local-path-provisioner' in storage_pods.stdout"

    - name: Wait for Local Path Provisioner to stabilise
      shell: |
        kubectl get pods -n local-path-storage --no-headers | (grep Running || true) | wc -l
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: storage_ready
      retries: 20
      delay: 20
      until: storage_ready.stdout|int >= 1

    - name: Install Metrics Server
      command: >
        kubectl apply -f
        https://github.com/kubernetes-sigs/metrics-server/releases/download/v0.8.1/components.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Patch metrics-server for insecure kubelet TLS (needed for many labs)
      command: >
        kubectl patch deployment metrics-server
        -n kube-system
        --type='json'
        -p='[
          {
            "op": "add",
            "path": "/spec/template/spec/containers/0/args/-",
            "value": "--kubelet-insecure-tls"
          }
        ]'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      failed_when: false

    - name: Wait for metrics-server pods to exist
      command: kubectl get pods -n kube-system
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: metrics_pods
      retries: 20
      delay: 20
      until: "'metrics-server' in metrics_pods.stdout"

    - name: Wait for metrics-server to stabilise
      shell: |
        kubectl get pods -n kube-system --no-headers | (grep metrics-server | grep Running || true) | wc -l
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: metrics_ready
      retries: 20
      delay: 20
      until: metrics_ready.stdout|int >= 1

