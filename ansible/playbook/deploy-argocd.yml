---
- name: Deploy Argo CD
  hosts: k8s_control_plane
  become: true
  vars:
    kubeconfig: "/home/{{ ansible_user }}/.kube/config"

  tasks:
    - name: Ensure argocd manifests directory exists
      file:
        path: /opt/k8s/argocd
        state: directory
        mode: "0755"

    - name: Copy argocd manifests to control plane
      copy:
        src: /work/kubernetes/argocd/
        dest: /opt/k8s/argocd/

    - name: Apply argocd namespace
      command: kubectl apply -f /opt/k8s/argocd/namespace.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Add Argo CD Helm repo
      command: helm repo add argo https://argoproj.github.io/argo-helm
      register: argo_repo
      retries: 30
      delay: 30
      until: argo_repo.rc == 0

    - name: Update Helm repos
      command: helm repo update
      register: helm_update
      retries: 30
      delay: 30
      until: helm_update.rc == 0

    - name: Install Argo CD via Helm
      command: >
        helm upgrade --install argocd argo/argo-cd
        --namespace argocd
        --create-namespace
        --values /opt/k8s/argocd/values.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: argocd_install
      retries: 30
      delay: 30
      until: argocd_install.rc == 0

    - name: Wait for Argo CD pods to exist
      command: kubectl get pods -n argocd
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: argocd_pods
      retries: 30
      delay: 30
      until: "'argocd-server' in argocd_pods.stdout"

    - name: Wait for Argo CD to stabilise
      shell: |
        kubectl get pods -n argocd --no-headers | (grep Running || true) | wc -l
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: argocd_ready
      retries: 30
      delay: 30
      until: argocd_ready.stdout|int >= 5

    - name: Wait for argocd-server rollout
      command: kubectl rollout status deployment/argocd-server -n argocd --timeout=600s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Apply Argo CD ingress
      command: kubectl apply -f /opt/k8s/argocd/ingress.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
