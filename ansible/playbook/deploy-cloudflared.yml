---
- name: Deploy cloudflared tunnel
  hosts: k8s_control_plane
  become: true

  vars:
    kubeconfig: "/home/{{ ansible_user }}/.kube/config"
    terraform_output: "{{ lookup('file', '/artifacts/output.json') | from_json }}"
    tunnel_id: "{{ terraform_output.cloudflare_tunnel_id.value }}"
    account_id: "{{ terraform_output.cloudflare_account_id.value }}"
    cloudflare_api_token: "{{ lookup('env', 'TF_VAR_cloudflare_api_token') }}"

  tasks:
    - name: Fetch tunnel token from Cloudflare API
      uri:
        url: "https://api.cloudflare.com/client/v4/accounts/{{ account_id }}/cfd_tunnel/{{ tunnel_id }}/token"
        method: GET
        headers:
          Authorization: "Bearer {{ cloudflare_api_token }}"
          Content-Type: "application/json"
        return_content: true
      register: tunnel_token_response

    - name: Set tunnel token fact
      set_fact:
        tunnel_token: "{{ tunnel_token_response.json.result }}"

    - name: Ensure cloudflared directory exists
      file:
        path: /opt/k8s/cloudflared
        state: directory
        mode: "0755"

    - name: Copy manifests to control plane
      copy:
        src: /work/kubernetes/cloudflared/
        dest: /opt/k8s/cloudflared/

    - name: Apply namespace
      command: kubectl apply -f /opt/k8s/cloudflared/namespace.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Create cloudflared tunnel token secret
      shell: |
        kubectl create secret generic cloudflared-token \
          --namespace=cloudflared \
          --from-literal=token="{{ tunnel_token }}" \
          --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Apply cloudflared deployment
      command: kubectl apply -f /opt/k8s/cloudflared/deployment.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Wait for cloudflared rollout
      command: kubectl rollout status deployment/cloudflared -n cloudflared --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
