---
- name: Deploy Monitoring Stack
  hosts: k8s_control_plane
  become: true
  vars:
    kubeconfig: /home/{{ ansible_user }}/.kube/config
  environment:
    KUBECONFIG: "{{ kubeconfig }}"

  tasks:
    - name: Copy monitoring manifests
      copy:
        src: /work/kubernetes/monitoring/
        dest: /tmp/monitoring/

    - name: Create monitoring namespace
      command: kubectl apply -f /tmp/monitoring/namespace.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Add Prometheus Helm repo
      command: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
      register: helm_repo_add
      retries: 30
      delay: 30
      until: helm_repo_add.rc == 0

    - name: Update Helm repos
      command: helm repo update
      register: helm_repo_update
      retries: 30
      delay: 30
      until: helm_repo_update.rc == 0

    - name: Install kube-prometheus-stack
      command: >
        helm upgrade --install kube-prometheus-stack
        prometheus-community/kube-prometheus-stack
        --namespace monitoring
        --values /tmp/monitoring/values.yaml
        --set grafana.adminPassword={{ lookup('env', 'GRAFANA_ADMIN_PASSWORD') }}
      register: helm_install_stack
      retries: 20
      delay: 30
      until: helm_install_stack.rc == 0

    - name: Wait for monitoring pods to exist
      command: kubectl get pods -n monitoring
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: monitoring_pods
      retries: 30
      delay: 30
      until: "'prometheus' in monitoring_pods.stdout"

    - name: Wait for monitoring stack to stabilise
      shell: |
        kubectl get pods -n monitoring --no-headers | (grep Running || true) | wc -l
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: monitoring_ready
      retries: 30
      delay: 30
      until: monitoring_ready.stdout|int >= 3

    - name: Deploy Grafana ingress
      command: kubectl apply -f /tmp/monitoring/grafana-ingress.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: grafana_ingress
      retries: 30
      delay: 30
      until: grafana_ingress.rc == 0

    - name: Register monitoring Application with Argo CD
      command: kubectl apply -f /opt/k8s/argocd/apps/monitoring.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: argo_monitoring
      retries: 30
      delay: 30
      until: argo_monitoring.rc == 0