---
- name: Deploy WordPress to Kubernetes
  hosts: k8s_control_plane
  vars:
    kubeconfig: /home/{{ ansible_user }}/.kube/config
  become: true
  tasks:
    - name: Create application directory on master
      file:
        path: /opt/k8s/wordpress
        state: directory
        mode: "0755"
    - name: Wait for ingress controller pods to exist
      command: kubectl get pods -n ingress-nginx
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: ingress_pods
      retries: 30
      delay: 30
      until: "'ingress-nginx-controller' in ingress_pods.stdout"

    - name: Wait for ingress controller to stabilise
      shell: |
        kubectl get pods -n ingress-nginx --no-headers | (grep Running || true) | wc -l
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: ingress_ready
      retries: 30
      delay: 30
      until: ingress_ready.stdout|int >= 1

    - name: Wait for storage provisioner pods to exist
      command: kubectl get pods -n local-path-storage
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: storage_pods
      retries: 30
      delay: 30
      until: "'local-path-provisioner' in storage_pods.stdout"

    - name: Wait for storage provisioner to stabilise
      shell: |
        kubectl get pods -n local-path-storage --no-headers | (grep Running || true) | wc -l
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: storage_ready
      retries: 30
      delay: 30
      until: storage_ready.stdout|int >= 1
    - name: Create wordpress namespace
      command: kubectl create namespace wordpress
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: ns_result
      failed_when: false
      changed_when: "'created' in ns_result.stdout"

    - name: Create wordpress secrets from environment variables
      shell: |
        kubectl create secret generic wordpress-secrets \
          --namespace=wordpress \
          --from-literal=mariadb-root-password="{{ lookup('env', 'MARIADB_ROOT_PASSWORD') }}" \
          --from-literal=mariadb-password="{{ lookup('env', 'MARIADB_PASSWORD') }}" \
          --from-literal=mariadb-database=wordpress \
          --from-literal=mariadb-user=wordpress \
          --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Copy WordPress manifests to master
      copy:
        src: /work/kubernetes/wordpress/
        dest: /opt/k8s/wordpress/
        mode: "0644"

    - name: Apply WordPress manifests
      command: kubectl apply -k /opt/k8s/wordpress
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: wordpress_apply
      retries: 30
      delay: 30
      until: wordpress_apply.rc == 0

    - name: Wait for MariaDB to accept connections
      shell: |
        kubectl exec -n wordpress deployment/mariadb -- \
          mariadb -uroot -e "SELECT 1"
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: mariadb_ready
      retries: 30
      delay: 30
      until: mariadb_ready.rc == 0
      failed_when: false

    - name: Ensure wordpress database exists
      shell: |
        kubectl exec -n wordpress deployment/mariadb -- \
          mariadb -uroot \
          -e "CREATE DATABASE IF NOT EXISTS wordpress;"
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: db_result
      retries: 30
      delay: 30
      until: db_result.rc == 0

    - name: Ensure wordpress user has grants from any host
      shell: |
        kubectl exec -n wordpress deployment/mariadb -- \
          mariadb -uroot \
          -e "GRANT ALL PRIVILEGES ON wordpress.* TO 'wordpress'@'%' IDENTIFIED BY '{{ lookup('env', 'MARIADB_PASSWORD') }}'; FLUSH PRIVILEGES;"
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: grant_result
      retries: 30
      delay: 30
      until: grant_result.rc == 0

    - name: Wait for WordPress pods to exist
      command: kubectl get pods -n wordpress
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: wordpress_pods
      retries: 30
      delay: 30
      until: "'wordpress' in wordpress_pods.stdout"

    - name: Wait for WordPress to stabilise
      shell: |
        kubectl get pods -n wordpress --no-headers | (grep Running || true) | wc -l
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: wordpress_ready
      retries: 30
      delay: 30
      until: wordpress_ready.stdout|int >= 1

    - name: Register wordpress Application with Argo CD
      command: kubectl apply -f /opt/k8s/argocd/apps/wordpress.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: argo_wordpress
      retries: 30
      delay: 30
      until: argo_wordpress.rc == 0